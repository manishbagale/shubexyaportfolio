<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Shubhechchha Shah</title>
    <style>
        body {
            background-color: rgb(36, 34, 37);
            color: #c58282;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            scroll-behavior: smooth;
        }

        /* Navigation Bar */
        #head {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 20px;
            justify-content: center;
            position: sticky;
            top: 0;
            background-color: rgb(36, 34, 37);
            z-index: 1000;
        }

        #head a {
            font-size: 22px;
            text-decoration: none;
            color: #c58282;
            font-weight: lighter;
        }

        /* Hero Section (Introduction) */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            min-height: 90vh; 
            padding: 20px;
            flex-wrap: wrap;
        }

        .container {
            width: 320px;
            height: 320px;
            flex-shrink: 0;
        }

        .container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c58282;
        }

        .text-pro {
            font-size: 30px;
            max-width: 550px;
            line-height: 1.4;
            animation: coloranimation 3s 1 forwards;
        }

        @keyframes coloranimation {
            0% { color: #f0e877; }
            50% { color: #6498db; }
            100% { color: #c58282; }
        }

        /* Appointment Section (Separated from Bio) */
        .appointment-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 15px;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .iframe-wrapper {
            width: 100%;
            max-width: 640px;
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
        }

        /* Responsive Mobile Layout */
        @media screen and (max-width: 768px) {
            #head { gap: 15px; }
            .hero { flex-direction: column; text-align: center; min-height: auto; padding-top: 50px; }
            .container { width: 250px; height: 250px; }
            .text-pro { font-size: 22px; }
            iframe { height: 600px; }
        }
    </style>
</head>
<body>

    <nav id="head">
        <a href="about.html">About me</a>
        <a href="#appointment">Appointment</a>
        <a href="https://www.facebook.com/share/1HZkqhFwaZ/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/subexya_shah?igsh=cnowY245aHZid2Nh" target="_blank">Instagram</a>
    </nav>

    <div class="hero">
        <div class="container">
            <img src="pic.jpg" alt="Shubhechchha Shah">
        </div>
        <div class="text-pro">
            HI! it’s me Shubhechchha, <br>
            Curious and creative, always exploring ways to improve and grow. I enjoy learning new skills and tackling challenges with dedication.
        </div>
    </div>

    <section id="appointment" class="appointment-section">
        <h2 style="font-size: 32px; margin-bottom: 25px;">Book an Appointment</h2>
        <div class="iframe-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSeYiBGEFK1ZZPsoepPhxJhU9S6s8y1BJ9EQgAMeLB0IKz-1kQ/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                Loading…
            </iframe>
        </div>
    </section>

</body>
</html>
