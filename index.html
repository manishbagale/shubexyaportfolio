<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Shubhechchha Shah</title>
    <style>
        body {
            background-color: rgb(36, 34, 37);
            color: #c58282;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
        }

        #head {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            margin: 40px auto;
            width: fit-content;
            height: 60px;
            align-items: center;
            justify-content: center;
        }

        #head a {
            font-size: 25px;
            cursor: pointer;
            font-weight: lighter;
            text-decoration: none;
            color: #c58282;
        }

        .text {
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .container {
            width: 400px;
            height: 400px;
            flex-shrink: 0;
        }

        .container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid #c58282;
        }

        @keyframes coloranimation {
            0%   { color: #f0e877; }
            25%  { color: #fafc7c; }
            50%  { color: #6498db; }
            75%  { color: #549946; }
            100% { color: #c58282; }
        }

        .text-pro {
            font-size: 35px;
            max-width: 600px;
            animation: coloranimation 3s 1 forwards;
            line-height: 1.4;
        }

        @media screen and (max-width: 768px) {
            .text {
                flex-direction: column;
                text-align: center;
            }
            .container {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <nav id="head">
        <a href="about.html">About me</a>
        <a href="https://forms.gle/xtttj3swrtHCrP2D8" target="_blank">Appointment</a>
        <a href="https://www.facebook.com/share/1HZkqhFwaZ/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/subexya_shah?igsh=cnowY245aHZid2Nh" target="_blank">Instagram</a>
    </nav>

    <main class="text">
        <div class="container">
            <img src="img/pic.jpg" alt="Shubhechchha Shah Profile Picture">
        </div>
        <div class="text-pro">
            HI! it’s me Shubhechchha, <br>
            Curious and creative, always exploring ways to improve and grow. 
            I enjoy learning new skills, improving myself every day, and 
            tackling challenges with enthusiasm and dedication.
        </div>
    </main>
</body>
</html>
