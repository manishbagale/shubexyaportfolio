<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Shubhechchha Shah</title>
    <style>
        /* General Page Styling */
        body {
            background-color: rgb(36, 34, 37);
            color: #c58282;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            scroll-behavior: smooth;
        }

        /* Navigation Bar */
        #head {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            margin: 20px auto;
            width: fit-content;
            height: 60px;
            align-items: center;
            justify-content: center;
        }

        #head a {
            font-size: 25px;
            text-decoration: none;
            color: #c58282;
            font-weight: lighter;
        }

        /* Introduction Section */
        .intro-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            flex-wrap: wrap;
        }

        .profile-pic {
            width: 350px;
            height: 350px;
            flex-shrink: 0;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c58282;
        }

        .text-pro {
            font-size: 32px;
            max-width: 600px;
            line-height: 1.5;
            animation: coloranimation 3s 1 forwards;
        }

        /* Appointment Section (Iframe) */
        .appointment-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .appointment-section h2 {
            font-size: 36px;
            margin-bottom: 30px;
        }

        .iframe-wrapper {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Animation */
        @keyframes coloranimation {
            0%   { color: #f0e877; }
            50%  { color: #6498db; }
            100% { color: #c58282; }
        }

        /* Responsive Mobile View */
        @media screen and (max-width: 768px) {
            .intro-container {
                flex-direction: column;
                text-align: center;
            }
            .profile-pic {
                width: 250px;
                height: 250px;
            }
            .text-pro {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <nav id="head">
        <a href="about.html">About me</a>
        <a href="#appointment">Appointment</a>
        <a href="https://www.facebook.com/share/1HZkqhFwaZ/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/subexya_shah?igsh=cnowY245aHZid2Nh" target="_blank">Instagram</a>
    </nav>

    <main class="intro-container">
        <div class="profile-pic">
            <img src="pic.jpg" alt="Profile Picture">
        </div>
        <div class="text-pro">
            HI! it’s me Shubhechchha, <br>
            Curious and creative, always exploring ways to improve and grow. I enjoy learning new skills and tackling challenges with dedication.
        </div>
    </main>

    <section id="appointment" class="appointment-section">
        <h2>Book an Appointment</h2>
        <div class="iframe-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSe-0iX-3I2pP_Vw1_X5X5y6_Z-u8-x3x-X-x-X-x-X-x-X/viewform?embedded=true" 
                width="100%" 
                height="800" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                Loading…
            </iframe>
        </div>
    </section>

</body>
</html>
