<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Shubhechchha Shah</title>
    <style>
        body {
            background-color: rgb(36, 34, 37);
            color: #c58282;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Navigation Bar */
        #head {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin: 20px auto;
            width: fit-content;
            padding: 10px;
            align-items: center;
            justify-content: center;
        }

        #head a {
            font-size: 25px;
            text-decoration: none;
            color: #c58282;
            font-weight: lighter;
        }

        /* Main Content Layout */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
            flex-wrap: wrap; /* Allows stacking on mobile */
        }

        /* Profile Picture Container */
        .container {
            width: 350px;
            height: 350px;
            flex-shrink: 0;
        }

        .container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c58282;
        }

        /* Introduction Text */
        .text-pro {
            font-size: 32px;
            max-width: 600px;
            line-height: 1.5;
            animation: coloranimation 3s 1 forwards;
        }

        @keyframes coloranimation {
            0%   { color: #f0e877; }
            50%  { color: #6498db; }
            100% { color: #c58282; }
        }

        /* Mobile Responsive Adjustments */
        @media screen and (max-width: 768px) {
            #head {
                gap: 15px;
            }
            #head a {
                font-size: 20px;
            }
            .main-content {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }
            .container {
                width: 250px;
                height: 250px;
            }
            .text-pro {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <nav id="head">
        <a href="about.html">About me</a>
        <a href="app.html">Appointment</a>
        <a href="https://www.facebook.com/share/1HZkqhFwaZ/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/subexya_shah?igsh=cnowY245aHZid2Nh" target="_blank">Instagram</a>
    </nav>

    <main class="main-content">
        <div class="container">
            <img src="pic.jpg" alt="Shubhechchha Shah">
        </div>
        <div class="text-pro">
            HI! it’s me Shubhechchha, <br>
            Curious and creative, always exploring ways to improve and grow. I enjoy learning new skills, improving myself every day, and tackling challenges with enthusiasm and dedication.
        </div>
    </main>

</body>
</html>
