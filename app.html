<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment - Shubhechchha Shah</title>
    <style>
        body {
            background-color: rgb(36, 34, 37);
            color: #c58282;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #head {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin: 20px auto;
            width: fit-content;
            padding: 10px;
            align-items: center;
            justify-content: center;
        }

        #head a {
            font-size: 22px;
            text-decoration: none;
            color: #c58282;
            font-weight: lighter;
        }

        .form-title {
            font-size: 32px;
            margin: 40px 0 20px 0;
            text-align: center;
        }

        .iframe-container {
            width: 95%;
            max-width: 640px;
            background-color: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
        }

        /* Style for a JavaScript-controlled button */
        .refresh-btn {
            margin-bottom: 50px;
            padding: 10px 20px;
            background-color: #c58282;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
        }

        @media screen and (max-width: 768px) {
            iframe { height: 600px; }
        }
    </style>
</head>
<body>

    <nav id="head">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="https://www.facebook.com/share/1HZkqhFwaZ/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/subexya_shah" target="_blank">Instagram</a>
    </nav>

    <h2 class="form-title">Book an Appointment</h2>

    <div class="iframe-container">
        <iframe 
            id="googleForm"
            src="https://docs.google.com/forms/d/e/1FAIpQLSeYiBGEFK1ZZPsoepPhxJhU9S6s8y1BJ9EQgAMeLB0IKz-1kQ/viewform?embedded=true" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0">
            Loading…
        </iframe>
    </div>

    <button class="refresh-btn" onclick="reloadForm()">Reload Form</button>

    <script>
        function reloadForm() {
            var iframe = document.getElementById('googleForm');
            iframe.src = iframe.src;
        }
    </script>

</body>
</html>
