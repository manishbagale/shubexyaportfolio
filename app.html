<head>
    <title> Appointment</title>
    <style>
        body{
            margin: 0;
        }
        #appointment{

            background-color: rgb(36, 34, 37);
            font-family: 'Times New Roman', Times, serif;
          
            display: flex;
            flex-direction: column;
            align-items:center;
            min-height: 100vh;
             

            
             }
            #appointment form {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap:20px;
                max-width: 500px;
                font-size: 17px;
            }
            #appointment input{
                width: 400px;
                 
                height: 10px;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    border: 2.5px solid #c58282;
    
   
}
#appointment textarea{
    border-collapse: collapse;
    width:400px ;
    height:100px;
    border: 2.5px solid #c58282;
    border-radius: 20px;
   
}
 #appointment label{
    color: #c58282;
}

 button:hover { 
    background-color: #c58282;
    color: aliceblue;
    cursor:pointer;


 }
  @media screen and (max-width: 768px) {
    #appointment input,
    #appointment textarea {
        width: 100%; 
    }
}
          

 button:hover { 
    background-color: #c58282;
    color: aliceblue;
    cursor:pointer;
}
button{
       border: 2.5px solid #c58282;
}
    </style>
</head>




<section id="appointment">
    <div><h2 style="color: #c58282; text-align: center;">Book an Appointment</h2>
    
    <form action="#" method="post">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Your email" required>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="time">Time:</label>
        <input type="time" id="time" name="time" required>

        <label for="message" >Message:</label>
        <textarea id="message" name="message" rows="4" placeholder=       "Write a message..."></textarea>

        <button  type="submit" style="color:black; border-radius: 30px;">Book Appointment</button>
    </form>
    
</section>
